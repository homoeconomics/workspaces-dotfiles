# Local tmux overrides layered on top of dotfriedrice.
#
# dotfriedrice's config (~/dotfriedrice/.config/tmux/tmux.conf) already provides
# tpm + tmux-resurrect and ends by initializing tpm. We source it, then add
# tmux-continuum (automatic save + restore on top of resurrect) and re-init tpm
# so the added plugin gets loaded.
#
# install.sh symlinks this file over ~/.config/tmux/tmux.conf and runs
# tpm/bin/install_plugins to clone tmux-continuum.

source-file "~/dotfriedrice/.config/tmux/tmux.conf"

# Automatically save sessions and restore them when the tmux server starts.
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @continuum-restore "on"
# set -g @continuum-save-interval "15"   # minutes; 15 is the default

# Re-init tpm so it picks up tmux-continuum (must run AFTER the @plugin line).
run "~/.config/tmux/plugins/tpm/tpm"
